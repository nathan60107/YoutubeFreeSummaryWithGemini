<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded-square backdrop -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- play triangle (video), slightly left of centre -->
  <path d="M25 20 L25 44 L45 32 Z" fill="#ffffff" stroke="#ffffff"
        stroke-width="3" stroke-linejoin="round" filter="url(#sh)"/>

  <!-- AI sparkle, large -->
  <path d="M46 11 L48.1 16.9 L54 19 L48.1 21.1 L46 27 L43.9 21.1 L38 19 L43.9 16.9 Z"
        fill="#FFD54F"/>
  <!-- AI sparkle, small -->
  <path d="M53 26 L53.8 28.2 L56 29 L53.8 29.8 L53 32 L52.2 29.8 L50 29 L52.2 28.2 Z"
        fill="#FFE082"/>
</svg>
